x-app-env: &app-env
  HOST: 0.0.0.0
  PORT: 6060
  DEV_MODE: docker
  MONGO_URL: ${APP_MONGO_URL:-mongodb://mongo:27017/test}
  JWT_SECRET: ${APP_JWT_SECRET:-docker-jwt-secret}
  BRAINTREE_MERCHANT_ID: ${APP_BRAINTREE_MERCHANT_ID:-docker-merchant-id}
  BRAINTREE_PUBLIC_KEY: ${APP_BRAINTREE_PUBLIC_KEY:-docker-public-key}
  BRAINTREE_PRIVATE_KEY: ${APP_BRAINTREE_PRIVATE_KEY:-docker-private-key}
  CHOKIDAR_USEPOLLING: "true"
  WATCHPACK_POLLING: "true"

services:
  mongo:
    image: mongo:7
    platform: ${APP_PLATFORM:-linux/amd64}
    restart: unless-stopped
    cpus: ${MONGO_CPUS:-1}
    mem_limit: ${MONGO_MEM_LIMIT:-1g}
    ports:
      - "${APP_MONGO_PORT:-27017}:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    volumes:
      - mongo-data:/data/db

  app:
    build:
      context: .
      dockerfile: Dockerfile
    platform: ${APP_PLATFORM:-linux/amd64}
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    cpus: ${APP_CPUS:-2}
    mem_limit: ${APP_MEM_LIMIT:-2g}
    environment: *app-env
    ports:
      - "${APP_CLIENT_PORT:-3000}:3000"
      - "${APP_SERVER_PORT:-6060}:6060"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:6060').then((res)=>process.exit(res.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 40s

  seed-admin:
    build:
      context: .
      dockerfile: Dockerfile
    platform: ${APP_PLATFORM:-linux/amd64}
    depends_on:
      mongo:
        condition: service_healthy
    cpus: ${APP_CPUS:-2}
    mem_limit: ${APP_MEM_LIMIT:-2g}
    environment: *app-env
    command: ["node", "setupAdmin.js"]

  k6:
    build:
      context: .
      dockerfile: Dockerfile.k6
    platform: ${APP_PLATFORM:-linux/amd64}
    depends_on:
      app:
        condition: service_healthy
    cpus: ${K6_CPUS:-1}
    mem_limit: ${K6_MEM_LIMIT:-512m}
    environment:
      K6_BASE_URL: http://app:6060
      K6_ADMIN_EMAIL: ${K6_ADMIN_EMAIL:-playwright-admin@test.com}
      K6_ADMIN_PASSWORD: ${K6_ADMIN_PASSWORD:-adminpassword123}
      K6_MAX_DURATION_MS: ${K6_MAX_DURATION_MS:-2000}
    profiles:
      - loadtest
    volumes:
      - ./k6-results:/results
    command:
      ["run", "--summary-export", "/scripts/summary.json", "--out", "json=/results/output.json", "/scripts/mixed-flows.js"]

volumes:
  mongo-data:
