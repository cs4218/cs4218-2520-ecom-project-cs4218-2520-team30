# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of Node.js
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: Run Tests

on:
  workflow_dispatch:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PORT: 6060
      DEV_MODE: test
      MONGO_URL: mongodb://localhost:27017/ecom-test
      PLAYWRIGHT_DB_NAME: ecom-playwright-ui
      JWT_SECRET: test-jwt-secret
      BRAINTREE_MERCHANT_ID: test-merchant-id
      BRAINTREE_PUBLIC_KEY: test-public-key
      BRAINTREE_PRIVATE_KEY: test-private-key

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    strategy:
      matrix:
        node-version: [24.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install Dependencies
        run: |
          npm ci
          npm install --prefix ./client

      - name: Run Backend Tests
        run: npm run test:backend

      - name: Run Frontend Tests
        run: npm run test:frontend

      - name: Install Playwright Browser
        run: npx playwright install --with-deps chromium

      - name: Detect Playwright UI Tests
        id: playwright-tests
        shell: bash
        run: |
          if find tests -name "*.spec.js" -o -name "*.spec.ts" | grep . > /dev/null; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify Playwright Secrets
        if: steps.playwright-tests.outputs.found == 'true'
        shell: bash
        env:
          MONGO_URL: ${{ secrets.MONGO_URL }}
          BRAINTREE_MERCHANT_ID: ${{ secrets.BRAINTREE_MERCHANT_ID }}
          BRAINTREE_PUBLIC_KEY: ${{ secrets.BRAINTREE_PUBLIC_KEY }}
          BRAINTREE_PRIVATE_KEY: ${{ secrets.BRAINTREE_PRIVATE_KEY }}
        run: |
          missing=0
          if [ -z "$MONGO_URL" ]; then
            echo "Missing MONGO_URL"
            missing=1
          fi
          if [ -z "$BRAINTREE_MERCHANT_ID" ]; then
            echo "Missing BRAINTREE_MERCHANT_ID"
            missing=1
          fi
          if [ -z "$BRAINTREE_PUBLIC_KEY" ]; then
            echo "Missing BRAINTREE_PUBLIC_KEY"
            missing=1
          fi
          if [ -z "$BRAINTREE_PRIVATE_KEY" ]; then
            echo "Missing BRAINTREE_PRIVATE_KEY"
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then
            echo "Warning: Some secrets are missing. Using defaults if provided in playwright.config.mjs."
          fi

      - name: Seed Playwright Admin User
        if: steps.playwright-tests.outputs.found == 'true'
        env:
          PLAYWRIGHT_MONGO_URL: mongodb://localhost:27017/ecom-test
        run: node setupAdmin.js

      - name: Run Playwright UI Tests
        if: steps.playwright-tests.outputs.found == 'true'
        env:
          DEBUG: pw:webserver
          PLAYWRIGHT_MONGO_URL: mongodb://localhost:27017/ecom-test
          BRAINTREE_MERCHANT_ID: ${{ secrets.BRAINTREE_MERCHANT_ID }}
          BRAINTREE_PUBLIC_KEY: ${{ secrets.BRAINTREE_PUBLIC_KEY }}
          BRAINTREE_PRIVATE_KEY: ${{ secrets.BRAINTREE_PRIVATE_KEY }}
        run: npm run test:ui

      - name: Skip Playwright UI Tests
        if: steps.playwright-tests.outputs.found != 'true'
        run: echo "No Playwright UI test files found under tests/. Skipping UI test run."

      - name: Upload Playwright Report
        if: always() && steps.playwright-tests.outputs.found == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore
