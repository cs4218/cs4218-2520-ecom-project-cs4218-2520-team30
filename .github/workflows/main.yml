# This workflow runs tests and triggers the AI analysis agent after each run.
# AI agent (n8n + Claude) reads the JSON test results and posts analysis to the PR.

name: Run Tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [24.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - run: npm ci
      - run: npm install
      - name: Install Client Dependencies
        run: npm install --prefix ./client

      # Create reports directory for JSON output
      - name: Create reports directory
        run: mkdir -p reports

      # Run backend tests and save JSON results for AI analysis
      - name: Run Backend Tests
        continue-on-error: true
        run: |
          node --experimental-vm-modules node_modules/jest/bin/jest.js \
            --config jest.backend.config.js \
            --json --outputFile=reports/jest-backend-results.json
        id: backend-tests

      # Run frontend tests and save JSON results for AI analysis
      - name: Run Frontend Tests
        continue-on-error: true
        run: |
          node --experimental-vm-modules node_modules/jest/bin/jest.js \
            --config jest.frontend.config.js \
            --json --outputFile=reports/jest-frontend-results.json
        id: frontend-tests

      # Run integration tests and save JSON results for AI analysis
      - name: Run Integration Tests
        continue-on-error: true
        run: |
          node --experimental-vm-modules node_modules/jest/bin/jest.js \
            --config jest.integration.config.js \
            --json --outputFile=reports/jest-integration-results.json
        id: integration-tests

      # Fail the build if any Jest suite failed
      - name: Check Jest Results
        run: |
          FAILED=0
          if [ "${{ steps.backend-tests.outcome }}" = "failure" ]; then
            echo "Backend tests failed"
            FAILED=1
          fi
          if [ "${{ steps.frontend-tests.outcome }}" = "failure" ]; then
            echo "Frontend tests failed"
            FAILED=1
          fi
          if [ "${{ steps.integration-tests.outcome }}" = "failure" ]; then
            echo "Integration tests failed"
            FAILED=1
          fi
          exit $FAILED

      # Upload all Jest JSON results as a single artifact for the AI agent to fetch
      - name: Upload Jest Results (for AI analysis)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jest-results
          path: reports/
          if-no-files-found: ignore
          retention-days: 30

      - name: Install Playwright Browser
        run: npx playwright install --with-deps chromium

      - name: Detect Playwright UI Tests
        id: playwright-tests
        shell: bash
        run: |
          if compgen -G "tests/*.ui.spec.js" > /dev/null; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      # Run Playwright with JSON reporter so AI agent can read results
      - name: Run Playwright UI Tests
        if: steps.playwright-tests.outputs.found == 'true'
        continue-on-error: true
        run: npx playwright test --reporter=json,html
        id: ui-tests
        env:
          PLAYWRIGHT_JSON_OUTPUT_NAME: playwright-report/results.json

      - name: Skip Playwright UI Tests
        if: steps.playwright-tests.outputs.found != 'true'
        run: echo "No Playwright UI test files found under tests/. Skipping UI test run."

      - name: Upload Playwright Report
        if: always() && steps.playwright-tests.outputs.found == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore

      # Trigger the n8n AI analysis agent with the run details
      # n8n will fetch the artifacts, call Claude, and post findings to the PR
      - name: Trigger AI Analysis Agent (n8n)
        if: always() && vars.N8N_ENABLED == 'true'
        continue-on-error: true
        run: |
          curl -s -X POST "${{ secrets.N8N_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "run_id": "${{ github.run_id }}",
              "repo": "${{ github.repository }}",
              "branch": "${{ github.ref_name }}",
              "commit_sha": "${{ github.sha }}",
              "pr_number": "${{ github.event.number }}",
              "actor": "${{ github.actor }}",
              "backend_outcome": "${{ steps.backend-tests.outcome }}",
              "frontend_outcome": "${{ steps.frontend-tests.outcome }}",
              "integration_outcome": "${{ steps.integration-tests.outcome }}",
              "ui_outcome": "${{ steps.ui-tests.outcome }}"
            }' \
            --max-time 10
          echo "AI analysis triggered (run_id=${{ github.run_id }})"
